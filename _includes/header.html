<header class="navigation" role="banner">
  <div class="navigation-wrapper">
    <a href="{{ site.baseurl }}/" class="logo" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
  {% if site.logo %}
<img src="{{ site.logo | prepend: site.baseurl }}" 
     alt="{{ site.title }}" 
     style="border-radius: 50%;">
  <span style="font-weight: 600; color: inherit;">Ashley Flick</span>
  {% else %}
  <span>{{ site.title }}</span>
  {% endif %}
</a>
    <a href="javascript:void(0)" class="navigation-menu-button" id="js-mobile-menu">
      <i class="fa fa-bars"></i>
    </a>
    <nav role="navigation">
      <ul id="js-navigation-menu" class="navigation-menu show">
				{% include nav_links.html %}
      </ul>
    </nav>
  </div>
</header>
